<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kaarttrainer</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f4ef;
        --panel: #ffffff;
        --ink: #202124;
        --muted: #5f6368;
        --line: #d8d5cc;
        --accent: #186c78;
        --good: #167847;
        --bad: #b3261e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: var(--panel);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .title {
        margin: 0;
        font-size: 28px;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .intro,
      .hint {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .status,
      .file-box {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        background: #fbfaf7;
      }

      .file-box {
        display: grid;
        gap: 10px;
      }

      .option-row {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        line-height: 1.35;
      }

      .option-row input {
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
        flex: 0 0 auto;
      }

      .file-input {
        width: 100%;
        max-width: 100%;
      }

      .label {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .prompt {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.15;
      }

      .feedback {
        min-height: 26px;
        margin: 0;
        font-weight: 700;
        line-height: 1.35;
      }

      .feedback.good {
        color: var(--good);
      }
      .feedback.bad {
        color: var(--bad);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .button {
        border: 1px solid var(--accent);
        border-radius: 8px;
        background: var(--accent);
        color: #ffffff;
        min-height: 42px;
        padding: 0 14px;
        cursor: pointer;
      }

      .button.secondary {
        background: #ffffff;
        color: var(--accent);
      }

      .button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #fbfaf7;
      }

      .stat strong {
        display: block;
        font-size: 24px;
        line-height: 1;
      }

      .stat span {
        color: var(--muted);
        font-size: 12px;
      }

      .main {
        min-width: 0;
        padding: 24px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 16px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .select {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        padding: 0 12px;
      }

      .map-shell {
        min-height: 360px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: auto;
        background: #ffffff;
      }

      .map-wrap {
        position: relative;
        width: min(100%, 1586.6667px);
        min-width: 760px;
        aspect-ratio: var(--map-ratio, 1586.6667 / 1121.3333);
        margin: 0 auto;
      }

      .map-image,
      .hotspot-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .map-image {
        display: block;
        user-select: none;
      }

      .hotspot {
        cursor: pointer;
        fill: rgba(24, 108, 120, 0);
        stroke: rgba(24, 108, 120, 0);
        stroke-width: 4;
        transition: fill 120ms ease, stroke 120ms ease, stroke-width 120ms ease;
      }

      .hotspot:hover {
        fill: rgba(24, 108, 120, 0.18);
        stroke: rgba(24, 108, 120, 0.7);
      }

      .map-wrap.hide-points .hotspot:hover {
        fill: rgba(24, 108, 120, 0);
        stroke: rgba(24, 108, 120, 0);
      }

      .hotspot.correct {
        fill: rgba(22, 120, 71, 0.2);
        stroke: var(--good);
        stroke-width: 8;
      }

      .hotspot.incorrect {
        fill: rgba(179, 38, 30, 0.2);
        stroke: var(--bad);
        stroke-width: 8;
      }

      .hotspot.reveal {
        fill: rgba(22, 120, 71, 0.16);
        stroke: var(--good);
        stroke-width: 8;
        stroke-dasharray: 10 6;
      }

      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }
        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
        .main {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="sidebar" aria-label="Quiz">
        <div>
          <h1 class="title">Kaarttrainer</h1>
          <p class="intro">
            Kies je blinde SVG. De app leest alle rode punten met een titel en
            maakt daar kaartvragen van.
          </p>
        </div>

        <label class="file-box">
          <span class="label">SVG-kaart</span>
          <input
            class="file-input"
            id="svgFile"
            type="file"
            accept=".svg,image/svg+xml"
          />
        </label>

        <label class="file-box option-row">
          <input id="hideObjects" type="checkbox" />
          <span>Objecten verbergen tijdens vragen</span>
        </label>

        <div class="status" aria-live="polite">
          <p class="label">Duid aan</p>
          <p class="prompt" id="prompt">Kies eerst je SVG</p>
        </div>

        <p class="feedback" id="feedback"></p>

        <div class="controls">
          <button class="button" id="nextButton" type="button" disabled>
            Volgende
          </button>
          <button
            class="button secondary"
            id="revealButton"
            type="button"
            disabled
          >
            Toon antwoord
          </button>

        <div class="stats" aria-label="Score">
          <div class="stat">
            <strong id="correctCount">0</strong><span>juist</span>
          </div>
          <div class="stat">
            <strong id="wrongCount">0</strong><span>fout</span>
          </div>
          <div class="stat">
            <strong id="streakCount">0</strong><span>reeks</span>
          </div>
          <div class="stat">
            <strong id="progressCount">0 / 0</strong><span>voortgang</span>
          </div>
        </div>

        <div class="controls">
          <button
            class="button secondary"
            id="resetButton"
            type="button"
            disabled
          >
            Herlaad alle punten
          </button>
          <button
            class="button secondary"
            id="retryButton"
            type="button"
            style="display:none"
          >
            Herlaad foute antwoorden
          </button>
        </div>
      </section>

      <section class="main" aria-label="Kaart">
        <div class="toolbar">
        </div>

        <div class="map-shell">
          <div class="map-wrap" id="mapWrap">
            <img class="map-image" id="mapImage" alt="Blinde kaart" />
            <svg
              class="hotspot-layer"
              id="hotspotLayer"
              viewBox="0 0 1586.6667 1121.3333"
              aria-label="Klikpunten"
            ></svg>
          </div>
        </div>
      </section>
    </main>
    <script src="js/map.js"></script>
  </body>
</html>
